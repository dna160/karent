version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: karent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: karent
      POSTGRES_USER: karent
      POSTGRES_PASSWORD: karent
    ports:
      - '5432:5432'
    volumes:
      - karent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U karent -d karent']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: karent_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - karent_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  karent_postgres_data:
  karent_redis_data:
